# ============================================
# AutoJobAgent - Docker Compose
# ============================================

version: '3.8'

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autojobagent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-3-flash-preview}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - APP_ENV=${APP_ENV:-production}
    volumes:
      # Persist user data
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
      - ./data/users.db:/app/data/users.db
      - ./data/browser_profiles:/app/data/browser_profiles
      - ./data/status:/app/data/status
      - ./data/sessions:/app/data/sessions
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: autojobagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    profiles:
      - production

# Volumes for persistence
volumes:
  app_data:
